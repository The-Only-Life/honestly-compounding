name: Cleanup Orphaned PDFs

on:
  schedule:
    # Runs daily at 2 AM UTC
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Call Cleanup Edge Function
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            'https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/cleanup-orphaned-pdfs' \
            -H 'Authorization: Bearer ${{ secrets.CLEANUP_SECRET_KEY }}' \
            -H 'Content-Type: application/json')

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 200 ]; then
            echo "Error: Cleanup failed with status $http_code"
            exit 1
          fi
