server {
    # Listen on port 8080 (your main entrypoint)
    listen 8080;
    server_name localhost;

    # Health endpoint - exact match only - goes to backend (port 3001)
    location = /health {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API endpoints - goes to backend (port 3001)
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Everything else - goes to frontend (port 3000)
    location / {
        root /app/web;
        index index.html;
        # For client-side routing - fallback to index.html
        try_files $uri $uri/ /index.html;
    }
}